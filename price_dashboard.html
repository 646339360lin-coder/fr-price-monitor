<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Amazon.fr 竞品价格监控看板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --text: #172033;
        --muted: #647084;
        --line: #d9dee8;
        --accent: #2563eb;
        --good: #047857;
        --warn: #b45309;
        --bad: #b91c1c;
      }
      * { box-sizing: border-box; }
      body { margin: 0; background: var(--bg); color: var(--text); }
      header { padding: 28px clamp(16px, 4vw, 48px) 18px; background: var(--panel); border-bottom: 1px solid var(--line); }
      h1 { margin: 4px 0 8px; font-size: clamp(24px, 3vw, 36px); }
      h2 { margin: 0 0 14px; font-size: 18px; }
      .eyebrow { margin: 0; color: var(--accent); font-weight: 700; letter-spacing: .04em; text-transform: uppercase; font-size: 12px; }
      .subtitle { margin: 0; color: var(--muted); }
      main { padding: 22px clamp(16px, 4vw, 48px) 42px; display: grid; gap: 18px; }
      section, .card { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 18px; }
      .data-status { display: none; border-color: #f59e0b; background: #fffbeb; color: #92400e; }
      .data-status.active { display: block; }
      .filters { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; align-items: end; }
      label { display: grid; gap: 6px; color: var(--muted); font-size: 13px; font-weight: 600; }
      select, input { width: 100%; border: 1px solid var(--line); border-radius: 6px; padding: 9px 10px; font: inherit; background: white; color: var(--text); }
      .metrics { display: grid; grid-template-columns: repeat(5, minmax(140px, 1fr)); gap: 12px; }
      .metric { border: 1px solid var(--line); border-radius: 8px; padding: 14px; background: #fbfcfe; }
      .metric span { display: block; color: var(--muted); font-size: 12px; margin-bottom: 8px; }
      .metric strong { font-size: 24px; }
      .view-tabs { display: flex; flex-wrap: wrap; gap: 10px; background: transparent; border: 0; padding: 0; }
      .tab-button { border: 1px solid var(--line); border-radius: 8px; padding: 10px 16px; background: var(--panel); color: var(--text); font: inherit; font-weight: 700; cursor: pointer; }
      .tab-button.active { border-color: var(--accent); background: #eff6ff; color: var(--accent); }
      .view-panel { display: none; }
      .view-panel.active { display: block; }
      .table-wrap { overflow: auto; border: 1px solid var(--line); border-radius: 8px; }
      table { width: 100%; border-collapse: collapse; min-width: 1720px; }
      th, td { padding: 10px 12px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; font-size: 13px; }
      th { background: #f1f4f8; color: #344055; position: sticky; top: 0; z-index: 1; }
      tr:hover td { background: #f9fbff; }
      .asin-link { font-weight: 700; white-space: nowrap; }
      .memo-cell { min-width: 220px; }
      .memo-input { width: 100%; min-height: 58px; resize: vertical; border: 1px solid var(--line); border-radius: 6px; padding: 8px 10px; font: inherit; color: var(--text); background: white; }
      .memo-date { display: block; margin-top: 6px; color: var(--muted); font-size: 12px; }
      .price { font-weight: 700; }
      .badge { display: inline-flex; align-items: center; border-radius: 999px; padding: 3px 8px; font-size: 12px; font-weight: 700; background: #eef2ff; color: #3730a3; }
      .badge.good { background: #ecfdf5; color: var(--good); }
      .badge.warn { background: #fffbeb; color: var(--warn); }
      .badge.bad { background: #fef2f2; color: var(--bad); }
      .muted { color: var(--muted); }
      .summary-list { display: grid; gap: 8px; margin: 0; padding: 0; list-style: none; }
      .summary-list details { border: 1px solid var(--line); border-radius: 8px; background: #fbfcfe; }
      .summary-list summary { display: grid; grid-template-columns: minmax(140px, 1fr) auto; gap: 12px; align-items: center; padding: 14px 16px; cursor: pointer; font-weight: 700; }
      .summary-count { color: var(--muted); font-size: 20px; font-weight: 600; }
      .change-detail { padding: 0 16px 16px; overflow: auto; }
      .change-table { min-width: 860px; }
      .chart-controls { display: grid; grid-template-columns: repeat(3, minmax(180px, 1fr)); gap: 12px; margin-bottom: 14px; }
      .chart-panel { min-height: 420px; }
      canvas { max-height: 320px; }
      a { color: var(--accent); text-decoration: none; }
      @media (max-width: 980px) {
        .filters, .metrics, .chart-controls { grid-template-columns: 1fr; }
        table { min-width: 1180px; }
        main, header { padding-left: 14px; padding-right: 14px; }
      }
    </style>
  </head>
  <body>
    <header>
      <p class="eyebrow">Amazon.fr Price Monitor</p>
      <h1>法国市场手机配件竞品价格监控</h1>
      <p class="subtitle">覆盖产品清单中新品和正常在售 ASIN，支持类型、款式、型号、价格区间筛选和历史价格趋势。</p>
    </header>

    <main>
      <section class="data-status" id="dataStatus"></section>

      <section class="filters">
        <label>品牌<select id="brandFilter"><option value="">全部品牌</option></select></label>
        <label>类型<select id="categoryFilter"><option value="">全部类型</option></select></label>
        <label>款式<select id="styleFilter"><option value="">全部款式</option></select></label>
        <label>重点型号<select id="modelFilter"><option value="">全部型号</option></select></label>
        <label>自定义搜索<input id="searchQuery" type="search" placeholder="ASIN / 型号 / 款式 / 备注" /></label>
        <label>最低价<input id="minPrice" type="number" min="0" step="0.01" placeholder="EUR" /></label>
        <label>最高价<input id="maxPrice" type="number" min="0" step="0.01" placeholder="EUR" /></label>
      </section>

      <section class="metrics" id="metrics"></section>

      <section class="view-tabs" aria-label="看板页面切换">
        <button class="tab-button active" type="button" data-view="detailsView" aria-selected="true">商品明细</button>
        <button class="tab-button" type="button" data-view="chartView" aria-selected="false">价格趋势</button>
        <button class="tab-button" type="button" data-view="changesView" aria-selected="false">本周价格异动统计</button>
      </section>

      <section class="view-panel active" id="detailsView">
        <h2>商品明细</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ASIN</th>
                <th>品牌</th>
                <th>类型</th>
                <th>款式</th>
                <th>型号</th>
                <th>规格</th>
                <th>手机品牌</th>
                <th>当前价</th>
                <th>MSRP</th>
                <th>折扣</th>
                <th>促销</th>
                <th>状态</th>
                <th>备忘</th>
                <th>抓取时间</th>
              </tr>
            </thead>
            <tbody id="productRows"></tbody>
          </table>
        </div>
      </section>

      <section class="view-panel chart-panel" id="chartView">
        <h2>价格趋势</h2>
        <div class="chart-controls">
          <label>ASIN 1<input class="product-asin-input" list="asinOptions" placeholder="例如 B0FJS7782G" autocomplete="off" /></label>
          <label>ASIN 2<input class="product-asin-input" list="asinOptions" placeholder="可选" autocomplete="off" /></label>
          <label>ASIN 3<input class="product-asin-input" list="asinOptions" placeholder="可选" autocomplete="off" /></label>
          <datalist id="asinOptions"></datalist>
        </div>
        <canvas id="priceChart"></canvas>
      </section>

      <section class="view-panel" id="changesView">
        <h2>本周价格异动统计</h2>
        <ul class="summary-list" id="weeklyChanges"></ul>
      </section>
    </main>

    <script>
      const NOTES_KEY = "amazon_fr_price_monitor_notes_v1";
      const state = { latest: [], history: [], chart: null, notes: loadNotes() };
      const fmt = new Intl.NumberFormat("fr-FR", { style: "currency", currency: "EUR" });

      function withCacheBust(url) {
        const separator = url.includes("?") ? "&" : "?";
        return `${url}${separator}v=${Date.now()}`;
      }

      function showStatus(message, isError = false) {
        const status = document.querySelector("#dataStatus");
        status.textContent = message;
        status.classList.toggle("active", Boolean(message));
        status.style.borderColor = isError ? "#fca5a5" : "#f59e0b";
        status.style.background = isError ? "#fef2f2" : "#fffbeb";
        status.style.color = isError ? "#991b1b" : "#92400e";
      }

      function todayStamp() {
        return new Date().toLocaleDateString("sv-SE");
      }

      function loadNotes() {
        try {
          return JSON.parse(localStorage.getItem(NOTES_KEY) || "{}");
        } catch {
          return {};
        }
      }

      function saveNotes() {
        localStorage.setItem(NOTES_KEY, JSON.stringify(state.notes));
      }

      async function loadJson(url, fallback) {
        try {
          const res = await fetch(withCacheBust(url), { cache: "no-store" });
          if (!res.ok) throw new Error(`${url} HTTP ${res.status}`);
          return await res.json();
        } catch (error) {
          showStatus(`数据文件读取失败：${error.message}。请确认打开的是 GitHub Pages 根地址，并刷新页面。`, true);
          return fallback;
        }
      }

      function keyOf(item) {
        return item.product_id || item.asin || item.product_url || item.product_name;
      }

      function asinOf(item) {
        return item.asin || item.product_id || "";
      }

      function price(value) {
        if (value === null || value === undefined || value === "") return null;
        const number = Number(value);
        return Number.isFinite(number) ? number : null;
      }

      function filteredProducts() {
        const brand = document.querySelector("#brandFilter").value;
        const category = document.querySelector("#categoryFilter").value;
        const style = document.querySelector("#styleFilter").value;
        const model = document.querySelector("#modelFilter").value;
        const search = document.querySelector("#searchQuery").value.trim().toLowerCase();
        const min = price(document.querySelector("#minPrice").value);
        const max = price(document.querySelector("#maxPrice").value);
        return state.latest.filter((item) => {
          const current = price(item.current_price);
          if (brand && item.brand !== brand) return false;
          if (category && item.category !== category) return false;
          if (style && item.style !== style) return false;
          if (model && item.model !== model) return false;
          if (search && !searchText(item).includes(search)) return false;
          if (min !== null && (current === null || current < min)) return false;
          if (max !== null && (current === null || current > max)) return false;
          return true;
        });
      }

      function searchText(item) {
        const asin = asinOf(item);
        const note = state.notes[asin] || {};
        return [
          asin,
          item.brand,
          item.category,
          item.style,
          item.model,
          item.spec,
          item.phone_brand,
          item.status,
          item.promotion_status,
          note.text,
          note.updated_at,
        ].filter(Boolean).join(" ").toLowerCase();
      }

      function fillSelect(selector, values) {
        const select = document.querySelector(selector);
        const current = select.value;
        select.innerHTML = select.firstElementChild.outerHTML;
        [...new Set(values.filter(Boolean))].sort().forEach((value) => {
          const opt = document.createElement("option");
          opt.value = value;
          opt.textContent = value;
          select.appendChild(opt);
        });
        select.value = current;
      }

      function renderMetrics(rows) {
        const prices = rows.map((item) => price(item.current_price)).filter((value) => value !== null);
        const fresh = rows.filter((item) => item.status === "ok" || item.status === "ok_manual").length;
        const stale = rows.filter((item) => item.status === "stale_price").length;
        const promos = rows.filter((item) => item.promotion_status).length;
        const avg = prices.length ? prices.reduce((a, b) => a + b, 0) / prices.length : null;
        document.querySelector("#metrics").innerHTML = [
          ["监控商品", rows.length],
          ["本次成功取价", fresh],
          ["沿用历史价", stale],
          ["平均售价", avg === null ? "-" : fmt.format(avg)],
          ["有促销", promos],
        ].map(([label, value]) => `<div class="metric"><span>${label}</span><strong>${value}</strong></div>`).join("");
      }

      function statusBadgeClass(status) {
        if (String(status || "").startsWith("ok")) return "good";
        if (status === "stale_price") return "warn";
        return "bad";
      }

      function renderTable(rows) {
        document.querySelector("#productRows").innerHTML = rows.map((item) => {
          const current = price(item.current_price);
          const msrp = price(item.msrp_price);
          const discount = Number(item.discount_percent);
          const asin = asinOf(item) || "-";
          const note = state.notes[asin] || {};
          return `<tr>
            <td><a class="asin-link" href="${escapeHtml(item.product_url || "#")}" target="_blank" rel="noreferrer">${escapeHtml(asin)}</a></td>
            <td>${escapeHtml(item.brand || "-")}</td>
            <td>${escapeHtml(item.category || "-")}</td>
            <td>${escapeHtml(item.style || "-")}</td>
            <td>${escapeHtml(item.model || "-")}</td>
            <td>${escapeHtml(item.spec || "-")}</td>
            <td>${escapeHtml(item.phone_brand || "-")}</td>
            <td class="price">${current === null ? "-" : fmt.format(current)}${item.price_carried_forward ? `<br><span class="muted">沿用上次有效价</span>` : ""}</td>
            <td>${msrp === null ? "-" : fmt.format(msrp)}</td>
            <td>${discount > 0 ? `<span class="badge good">${discount.toFixed(0)}%</span>` : "-"}</td>
            <td>${item.promotion_status ? `<span class="badge warn">${escapeHtml(item.promotion_status)}</span>` : "-"}</td>
            <td><span class="badge ${statusBadgeClass(item.status)}">${escapeHtml(item.status || "-")}</span></td>
            <td class="memo-cell">
              <textarea class="memo-input" data-asin="${escapeHtml(asin)}" placeholder="输入备忘">${escapeHtml(note.text || "")}</textarea>
              <span class="memo-date">${note.updated_at ? `更新：${escapeHtml(note.updated_at)}` : ""}</span>
            </td>
            <td class="muted">${escapeHtml(item.scraped_at || "-")}</td>
          </tr>`;
        }).join("");
      }

      function renderProductAsinOptions(rows) {
        const list = document.querySelector("#asinOptions");
        const asins = [...new Set(rows.map(asinOf).filter(Boolean))].sort();
        list.innerHTML = asins.map((asin) => `<option value="${escapeHtml(asin)}"></option>`).join("");
        const inputs = [...document.querySelectorAll(".product-asin-input")];
        if (!inputs.some((input) => input.value.trim()) && asins[0]) inputs[0].value = asins[0];
        renderChart();
      }

      function renderChart() {
        if (!window.Chart) {
          showStatus("价格明细已加载，但趋势图库没有加载成功。通常是网络拦截 CDN，刷新页面或稍后重试即可。");
          return;
        }
        const selectedAsins = [...new Set([...document.querySelectorAll(".product-asin-input")]
          .map((input) => input.value.trim())
          .filter(Boolean))].slice(0, 3);
        const series = selectedAsins.map((asin) => {
          const points = state.history
            .filter((item) => asinOf(item) === asin && price(item.current_price) !== null)
            .sort((a, b) => String(a.scraped_at).localeCompare(String(b.scraped_at)));
          return { asin, points };
        }).filter((item) => item.points.length);
        const labels = [...new Set(series.flatMap((item) => item.points.map((point) => point.scraped_at?.slice(0, 10) || "")))]
          .filter(Boolean)
          .sort();
        const colors = ["#2563eb", "#dc2626", "#047857"];
        const datasets = series.map((item, index) => {
          const byDate = new Map(item.points.map((point) => [point.scraped_at?.slice(0, 10) || "", price(point.current_price)]));
          return {
            label: item.asin,
            data: labels.map((label) => byDate.has(label) ? byDate.get(label) : null),
            borderColor: colors[index],
            backgroundColor: colors[index],
            tension: 0.25,
            spanGaps: true,
          };
        });
        if (state.chart) state.chart.destroy();
        state.chart = new Chart(document.querySelector("#priceChart"), {
          type: "line",
          data: {
            labels,
            datasets,
          },
          options: { responsive: true, scales: { y: { ticks: { callback: (value) => fmt.format(value) } } } },
        });
      }

      function renderWeeklyChanges() {
        const categories = weeklyChangeCategories();
        document.querySelector("#weeklyChanges").innerHTML = categories
          .map((category) => renderChangeCategory(category))
          .join("");
      }

      function weeklyChangeCategories() {
        const weekAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;
        const grouped = new Map();
        state.history.forEach((item) => {
          const time = Date.parse(item.scraped_at || "");
          if (!time || time < weekAgo) return;
          const key = keyOf(item);
          if (!grouped.has(key)) grouped.set(key, []);
          grouped.get(key).push(item);
        });
        const changes = [];
        grouped.forEach((rows) => {
          rows.sort((a, b) => String(a.scraped_at).localeCompare(String(b.scraped_at)));
          const first = rows[0], last = rows[rows.length - 1];
          const currentDelta = delta(first.current_price, last.current_price);
          const msrpDelta = delta(first.msrp_price, last.msrp_price);
          const newPromo = !first.promotion_status && Boolean(last.promotion_status);
          if (currentDelta || msrpDelta || newPromo) changes.push({ first, last, currentDelta, msrpDelta, newPromo });
        });
        return [
          { label: "售价降价", rows: changes.filter((c) => c.currentDelta < 0), mode: "current" },
          { label: "售价涨价", rows: changes.filter((c) => c.currentDelta > 0), mode: "current" },
          { label: "MSRP 降价", rows: changes.filter((c) => c.msrpDelta < 0), mode: "msrp" },
          { label: "MSRP 涨价", rows: changes.filter((c) => c.msrpDelta > 0), mode: "msrp" },
          { label: "新促销", rows: changes.filter((c) => c.newPromo), mode: "promo" },
        ];
      }

      function renderChangeCategory(category) {
        const detail = category.rows.length
          ? `<div class="change-detail">
              <table class="change-table">
                <thead>
                  <tr>
                    <th>ASIN</th>
                    <th>类型</th>
                    <th>款式</th>
                    <th>型号</th>
                    <th>变化前</th>
                    <th>变化后</th>
                    <th>时间</th>
                  </tr>
                </thead>
                <tbody>${category.rows.map((row) => renderChangeRow(row, category.mode)).join("")}</tbody>
              </table>
            </div>`
          : `<div class="change-detail muted">暂无商品</div>`;
        return `<li>
          <details>
            <summary><span>${escapeHtml(category.label)}</span><span class="summary-count">${category.rows.length} 个商品</span></summary>
            ${detail}
          </details>
        </li>`;
      }

      function renderChangeRow(change, mode) {
        const first = change.first;
        const last = change.last;
        const asin = asinOf(last) || "-";
        const before = mode === "msrp" ? price(first.msrp_price) : price(first.current_price);
        const after = mode === "msrp" ? price(last.msrp_price) : price(last.current_price);
        const beforeText = mode === "promo" ? (first.promotion_status || "-") : (before === null ? "-" : fmt.format(before));
        const afterText = mode === "promo" ? (last.promotion_status || "-") : (after === null ? "-" : fmt.format(after));
        return `<tr>
          <td><a class="asin-link" href="${escapeHtml(last.product_url || "#")}" target="_blank" rel="noreferrer">${escapeHtml(asin)}</a></td>
          <td>${escapeHtml(last.category || "-")}</td>
          <td>${escapeHtml(last.style || "-")}</td>
          <td>${escapeHtml(last.model || "-")}</td>
          <td>${escapeHtml(beforeText)}</td>
          <td>${escapeHtml(afterText)}</td>
          <td class="muted">${escapeHtml(first.scraped_at?.slice(0, 10) || "-")} → ${escapeHtml(last.scraped_at?.slice(0, 10) || "-")}</td>
        </tr>`;
      }

      function delta(a, b) {
        const first = price(a), last = price(b);
        if (first === null || last === null) return null;
        const diff = Number((last - first).toFixed(2));
        return diff === 0 ? null : diff;
      }

      function render() {
        const rows = filteredProducts();
        renderMetrics(rows);
        renderTable(rows);
        renderProductAsinOptions(rows);
        renderWeeklyChanges();
      }

      function switchView(viewId) {
        document.querySelectorAll(".view-panel").forEach((panel) => panel.classList.toggle("active", panel.id === viewId));
        document.querySelectorAll(".tab-button").forEach((button) => {
          const active = button.dataset.view === viewId;
          button.classList.toggle("active", active);
          button.setAttribute("aria-selected", String(active));
        });
        if (viewId === "chartView") renderChart();
      }

      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
      }

      async function init() {
        const latest = await loadJson("price_results_latest.json", { products: [] });
        const history = await loadJson("price_history.json", { products: [] });
        state.latest = latest.products || [];
        state.history = history.products || state.latest;
        if (state.latest.length) {
          showStatus("");
        } else {
          showStatus("当前页面没有读取到商品数据。如果你打开的是 price_dashboard.html，请改用 GitHub Pages 根地址。", true);
        }
        fillSelect("#brandFilter", state.latest.map((item) => item.brand));
        fillSelect("#categoryFilter", state.latest.map((item) => item.category));
        fillSelect("#styleFilter", state.latest.map((item) => item.style));
        fillSelect("#modelFilter", state.latest.map((item) => item.model));
        ["#brandFilter", "#categoryFilter", "#styleFilter", "#modelFilter", "#searchQuery", "#minPrice", "#maxPrice"]
          .forEach((selector) => document.querySelector(selector).addEventListener("input", render));
        document.querySelectorAll(".tab-button").forEach((button) => {
          button.addEventListener("click", () => switchView(button.dataset.view));
        });
        document.querySelector("#productRows").addEventListener("input", (event) => {
          if (!event.target.classList.contains("memo-input")) return;
          const asin = event.target.dataset.asin;
          if (!asin) return;
          const text = event.target.value;
          const date = todayStamp();
          const dateNode = event.target.parentElement.querySelector(".memo-date");
          if (text.trim()) {
            state.notes[asin] = { text, updated_at: date };
            if (dateNode) dateNode.textContent = `更新：${date}`;
          } else {
            delete state.notes[asin];
            if (dateNode) dateNode.textContent = "";
          }
          saveNotes();
        });
        document.querySelectorAll(".product-asin-input").forEach((input) => {
          input.addEventListener("input", renderChart);
          input.addEventListener("change", renderChart);
        });
        render();
      }

      init();
    </script>
  </body>
</html>
